# Broker registry — the single source of truth for broker metadata.
#
# mode:
#   automated   -> robots.txt permits automated fetch; custom parser required
#   assisted    -> restrictive ToS/robots; opened in a visible browser for the
#                  user to review (human-in-the-loop, NO bot-detection bypass)
#   optout_only -> no scan at all; curated opt-out / data-access deep link only
#
# verified: has the opt-out URL been human-checked? Unverified entries are shown
# with a warning so users are never silently sent to a stale page. Verify and
# flip to true as you confirm each URL.
#
# In v1 no broker is marked "automated": promotion to automated requires a
# per-site robots.txt check (Phase 3). Until then everything scan-related runs
# in assisted mode.

